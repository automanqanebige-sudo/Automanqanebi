<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Automanqanebi</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
    }

    .card {
      margin-top: 15px;
      background: white;
      padding: 10px;
      border-radius: 8px;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🚗 ავტომანქანები</h1>

<div class="box">

  <input type="text" id="search" placeholder="მოძებნე ბრენდი ან მოდელი..." oninput="searchCar()" />

  <label>ბრენდი:</label>
  <select id="brand" onchange="searchCar()">
    <option value="">ყველა</option>
    <option value="BMW">BMW</option>
    <option value="Mercedes">Mercedes</option>
    <option value="Toyota">Toyota</option>
  </select>

  <label>მოდელი:</label>
  <select id="model" onchange="searchCar()">
    <option value="">ყველა</option>
    <option value="X5">X5</option>
    <option value="E-Class">E-Class</option>
    <option value="Camry">Camry</option>
  </select>

  <div id="result" class="result"></div>

</div>

<script>
const cars = [
  { brand: "BMW", model: "X5", price: "$15000", img: "https://via.placeholder.com/300?text=BMW+X5" },
  { brand: "Mercedes", model: "E-Class", price: "$13000", img: "https://via.placeholder.com/300?text=E-Class" },
  { brand: "Toyota", model: "Camry", price: "$10000", img: "https://via.placeholder.com/300?text=Camry" }
];

function searchCar() {
  const brand = document.getElementById("brand").value.toLowerCase();
  const model = document.getElementById("model").value.toLowerCase();
  const search = document.getElementById("search").value.toLowerCase();

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  const filtered = cars.filter(car => {
    return (
      (!brand || car.brand.toLowerCase() === brand) &&
      (!model || car.model.toLowerCase() === model) &&
      (!search || car.brand.toLowerCase().includes(search) || car.model.toLowerCase().includes(search))
    );
  });

  if (filtered.length === 0) {
    resultDiv.innerHTML = "❌ ვერ მოიძებნა";
    return;
  }

  filtered.forEach(car => {
    resultDiv.innerHTML += `
      <div class="card">
        <img src="${car.img}" />
        <h3>${car.brand} ${car.model}</h3>
        <p>ფასი: ${car.price}</p>
      </div>
    `;
  });
}

// თავიდანვე აჩვენოს ყველა
searchCar();
</script>

</body>
</html>
