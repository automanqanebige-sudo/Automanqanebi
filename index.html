<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Automanqanebi</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    .result {
      margin-top: 20px;
      padding: 10px;
      background: #eee;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🚗 ავტომანქანები</h1>

<div class="box">

  <label>ბრენდი:</label>
  <select id="brand">
    <option value="">აირჩიე</option>
    <option value="BMW">BMW</option>
    <option value="Mercedes">Mercedes</option>
    <option value="Toyota">Toyota</option>
  </select>

  <label>მოდელი:</label>
  <select id="model">
    <option value="">აირჩიე</option>
    <option value="X5">X5</option>
    <option value="E-Class">E-Class</option>
    <option value="Camry">Camry</option>
  </select>

  <button onclick="searchCar()">ძებნა</button>

  <div id="result" class="result"></div>

</div>

<script>
function searchCar() {
  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model").value;

  if (!brand || !model) {
    document.getElementById("result").innerHTML = "⚠️ აირჩიე ბრენდი და მოდელი";
    return;
  }

  document.getElementById("result").innerHTML =
    "შედეგი: " + brand + " " + model + " 🚗";
}
</script>

</body>
</html>
