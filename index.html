<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Automanqanebi</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.box { background:white; padding:20px; border-radius:10px; max-width:450px; margin:auto; }
input, select { width:100%; padding:10px; margin-top:10px; }
button { margin-top:5px; padding:8px; width:100%; border:none; cursor:pointer; }
.card { margin-top:15px; background:white; padding:10px; border-radius:8px; }
img { width:100%; border-radius:8px; }
.login { background:black; color:white; }
.logout { background:red; color:white; }
.fav { background:orange; color:white; }
</style>
</head>

<body>

<h2>🚗 ავტომანქანები</h2>

<div class="box">

<button class="login" onclick="login()">Google Login</button>
<button class="logout" onclick="logout()">Logout</button>

<input id="search" placeholder="ძებნა..." oninput="searchCar()" />

<select id="brand" onchange="searchCar()">
<option value="">ყველა</option>
<option>BMW</option>
<option>Mercedes</option>
<option>Toyota</option>
</select>

<div id="result"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script>
// 🔴 ჩასვი შენი Firebase config აქ
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const cars = [
{ brand:"BMW", model:"X5", price:15000 },
{ brand:"Mercedes", model:"E-Class", price:13000 },
{ brand:"Toyota", model:"Camry", price:10000 }
];

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout(){
  auth.signOut();
}

function searchCar(){
  const brand = document.getElementById("brand").value;
  const search = document.getElementById("search").value.toLowerCase();

  const result = document.getElementById("result");
  result.innerHTML = "";

  const filtered = cars.filter(car =>
    (!brand || car.brand === brand) &&
    (!search || car.model.toLowerCase().includes(search))
  );

  filtered.forEach(car=>{
    result.innerHTML += `
      <div class="card">
        <h3>${car.brand} ${car.model}</h3>
        <p>$${car.price}</p>
        <button class="fav" onclick="addFav('${car.model}')">❤️ ფავორიტი</button>
      </div>
    `;
  });
}

async function addFav(model){
  const user = auth.currentUser;
  if(!user){
    alert("ჯერ გაიარე login!");
    return;
  }

  await db.collection("favorites").add({
    user: user.uid,
    model: model
  });

  alert("შენახულია Firebase-ში 🔥");
}

searchCar();
</script>

</body>
</html>
