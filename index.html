<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>AUTOMANQANEBI.GE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #2ecc71;
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    .lang {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .lang button {
      margin-left: 5px;
      padding: 5px;
    }

    .search-box {
      padding: 20px;
      background: white;
      margin: 15px;
      border-radius: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    .btn {
      background: #ff5a00;
      color: white;
      padding: 15px;
      border: none;
      width: 100%;
      margin-top: 15px;
      font-size: 18px;
      border-radius: 10px;
    }

    .categories {
      display: flex;
      justify-content: space-around;
      margin: 20px;
    }

    .cat {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 30%;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  AUTOMANQANEBI.GE
  <div class="lang">
    🇬🇪 🇷🇺 🇬🇧
  </div>
</header>

<div class="search-box">
  <input placeholder="ძებნა...">

  <select>
    <option>ფასი მინ</option>
    <option>1000</option>
    <option>5000</option>
  </select>

  <select>
    <option>ფასი მაქს</option>
    <option>10000</option>
    <option>50000</option>
  </select>

  <select>
    <option>საჭე</option>
    <option>მარცხენა</option>
    <option>მარჯვენა</option>
  </select>

  <button class="btn">ძებნა (0)</button>
</div>

<div class="categories">
  <div class="cat">🚗 მანქანები</div>
  <div class="cat">🚜 ტექნიკა</div>
  <div class="cat">🏍️ მოტო</div>
</div>

</body>
</html>
